[Dicom]
; DICOM AE-Title des Servers (max. 16 Zeichen)
AeTitle=OPENDICOM
; DICOM Port (Standard: 11112)
Port=11112

[Paths]
; Ordner, in dem das AIS .gdt-Dateien (Satzart 6301) ablegt
GdtInputFolder=C:\OpenDicom\gdt_in
; Ordner, in dem der Server .gdt-Antwortdateien (Satzart 6310) ablegt
GdtOutputFolder=C:\OpenDicom\gdt_out
; Ordner, in dem empfangene DICOM-Dateien gespeichert werden
DicomStorageFolder=C:\OpenDicom\storage

[Worklist]
; Maximale Haltezeit eines Worklist-Eintrags in Stunden (danach wird er geleert)
EntryTtlHours=24
; Standard-Modalität für Worklist-Abfragen (* = alle)
DefaultModality=*

[Serilog]
MinimumLevel=Information
